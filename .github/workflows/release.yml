name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  wasm:
    name: Build WASM release assets
    runs-on: ubuntu-latest

    steps:
      - name: Select release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install wasm-opt
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen

      - name: Build web WASM modules
        run: bash ./build.sh
        working-directory: web

      - name: Verify WASM modules
        shell: bash
        run: |
          set -euo pipefail

          test -d web/www/pkg
          test -n "$(find web/www/pkg -maxdepth 1 -name '*.wasm' -print -quit)"
          find web/www/pkg -maxdepth 1 -type f | sort

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          mkdir -p dist

          modules=(
            "obj_reader"
            "obj_writer"
            "ply_reader"
            "ply_writer"
            "gltf_reader"
            "gltf_writer"
            "fbx_reader"
            "fbx_writer"
          )

          for module in "${modules[@]}"; do
            package_name="draco-${module//_/-}-wasm-${tag}"
            mkdir -p "dist/${package_name}"

            cp "web/www/pkg/${module}.wasm" "dist/${package_name}/"
            cp "web/www/pkg/${module}.js" "dist/${package_name}/"
            cp "web/www/pkg/${module}.d.ts" "dist/${package_name}/"
            cp "web/www/pkg/${module}_bg.wasm.d.ts" "dist/${package_name}/"
            cp "web/www/pkg/LICENSE" "dist/${package_name}/"

            (cd "dist/${package_name}" && zip -r "../${package_name}.zip" .)
            rm -rf "dist/${package_name}"
          done

          find dist -maxdepth 1 -type f | sort

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

          gh release upload "$RELEASE_TAG" dist/*.zip --clobber
