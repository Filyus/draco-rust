name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check crates formatting
        run: cargo fmt --manifest-path crates/Cargo.toml --all -- --check

      - name: Check web formatting
        run: cargo fmt --manifest-path web/Cargo.toml --all -- --check

      - name: Test draco-core
        run: cargo test --manifest-path crates/Cargo.toml -p draco-core --lib

      - name: Test draco-io
        run: cargo test --manifest-path crates/Cargo.toml -p draco-io

      - name: Test web workspace
        run: cargo test --manifest-path web/Cargo.toml --workspace

      - name: Package draco-core
        run: cargo package --manifest-path crates/draco-core/Cargo.toml
