        note: "Decodes mesh connectivity using Sequential or Edgebreaker methods. Version-aware num_faces/num_points decoding (raw u32 for v<2.2, varint for v>=2.2)."
      - name: "decode_attributes"
        progress: "fully implemented"
        note: "Decodes attributes using SequentialIntegerAttributeDecoder. Sequential mesh parsing matches MeshEncoder stream; Edgebreaker parses attribute decoder identifiers, preserves the encoded decoder_type, and builds C++-style MeshAttributeCornerTable-equivalent connectivity for MESH_CORNER_ATTRIBUTE groups. Legacy Draco 1.0.0/1.1.0 cube_att Edgebreaker POSITION/TEX_COORD/NORMAL corner records now match matching C++ draco_decoder output. MESH_VERTEX_ATTRIBUTE split groups with no interior seams reuse the base Edgebreaker data-to-corner order, matching C++ and allowing speed 5 TEX_COORD parallelogram prediction without a Rust-specific fallback. For v2.0+ mesh prediction parents, decoded portable attributes are preserved with final point-to-value mappings so NORMAL and portable TEX_COORD prediction use the same parent data as C++ GetPortableAttribute(). Remaining caution is about unexercised historical combinations within the support policy, not a currently known mismatch in the committed legacy fixtures."
      - name: "generate_point_ids_dfs"
        progress: "fully implemented"
        note: "Implements Draco C++ DepthFirstTraverser traversal order over the decoded CornerTable for Edgebreaker attribute decoding. Uses sequential face iteration as seeds matching C++ decoder (not encoder's processed_connectivity_corners). Fixed DFS visit order (Next, Prev before loop; Tip in loop) matching C++ depth_first_traverser.h. Missing corner-table state in corrupted Edgebreaker streams now returns DracoError instead of panicking."
      - name: "is_vertex_on_boundary_impl"
        progress: "fully implemented"
        note: "Static helper matching C++ CornerTable::IsOnBoundary using swing_left(corner) == INVALID_CORNER_INDEX check."
