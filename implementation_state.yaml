parity_check_count: 4
status_notes:
  - "This file is a manually curated implementation log, not an exact percentage metric."
  - "Entries may be selective; avoid adding new duplicate path entries when a matching file entry already exists."
  - "When updating an existing file, merge new structures/functions/notes into the existing path block where practical; if duplicate path entries are found nearby or touched by the update, collapse them immediately."
  - "When duplicate entries disagree, prefer the most conservative reading and verify against code/tests."
parity_verifications:
  - id: 1
    function: "DepthFirstTraverser::TraverseFromCorner"
    source_file: "src/draco/compression/mesh/traverser/depth_first_traverser.h"
    status: completed
    note: "Iterative DFS logic verified. Shortcut for non-boundary vertices (continue Right without stack push) and stack-top replacement on split. Verified visit order: Next, Prev before Tip."
  - id: 2
    function: "MeshAttributeIndicesEncodingObserver::OnNewVertexVisited"
    source_file: "src/draco/compression/mesh/traverser/mesh_attribute_indices_encoding_observer.h"
    status: completed
    note: "Mapping order verified: AddPointId, corner_map.push, vertex_map[v]=num_values, num_values++."
  - id: 3
    function: "MeshTraversalSequencer::GenerateSequenceInternal"
    source_file: "src/draco/compression/mesh/traverser/mesh_traversal_sequencer.h"
    status: completed
    note: "Seed processing verified: connectivity corners reversed then init face corners appended."
  - id: 4
    function: "MeshEdgebreakerDecoderImpl::CreateAttributesDecoder"
    source_file: "src/draco/compression/mesh/mesh_edgebreaker_decoder_impl.cc"
    status: completed
    note: "Verified decoder_type controls whether non-position Edgebreaker attribute data uses attribute-specific connectivity. MESH_VERTEX_ATTRIBUTE marks is_connectivity_used=false even when boundary seam corners exist; no-interior-seam split groups reuse the base corner table/order and keep C++ parallelogram prediction enabled."

